{% extends 'base.html' %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% block title %}Edit Trail Note | TrailBook{% endblock %}

{% block content %}

<!-- Page Header -->
<h1 class="mb-1">Edit Trail Note</h1>
<p class="text-muted mb-4">On {{ note.trip.title }}</p>

<!-- Note Form -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}

            <!-- Actions -->
            <div class="d-flex align-items-center gap-3 mt-3">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'trips:trip_detail' note.trip.slug %}" class="text-decoration-none">&larr; Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
